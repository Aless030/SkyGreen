<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SkyGreen - Árboles de Bolivia 🌳</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/photo-sphere-viewer@4/dist/photo-sphere-viewer.css" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: #e8f5e9;
      margin: 0;
      padding: 20px;
      color: #2e7d32;
    }
    h1 {
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      max-width: 500px;
      font-size: 16px;
    }
    #viewer360 {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      margin-top: 15px;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌿 SkyGreen - Explorador de Árboles 🌿</h1>
    <input type="text" id="skygreen-question" placeholder="Ej: molle">
    <button onclick="askSkyGreen()">Consultar</button>
    <div id="viewer360"></div>
  </div>

  <!-- Librerías necesarias -->
  <script src="https://unpkg.com/three@0.140.0/build/three.min.js"></script>
  <script src="https://unpkg.com/photo-sphere-viewer@4/dist/photo-sphere-viewer.js"></script>

  <script>
    const imagenes360 = {
      // Puedes cambiar esta URL por "img/molle.jpg" si tienes una imagen panorámica local correcta
      "molle": "https://photo-sphere-viewer.js.org/assets/sphere.jpg"
    };

    function askSkyGreen() {
      const pregunta = document.getElementById("skygreen-question").value.toLowerCase().trim();
      const imagen = imagenes360[pregunta];

      document.getElementById("viewer360").innerHTML = "";

      if (imagen) {
        new PhotoSphereViewer.Viewer({
          container: document.getElementById('viewer360'),
          panorama: imagen,
          caption: `Vista 360° del ${pregunta}`,
          loadingImg: 'https://photo-sphere-viewer.js.org/assets/photosphere-logo.gif',
          navbar: 'zoom move fullscreen',
          defaultLong: Math.PI,
        });
      } else {
        document.getElementById("viewer360").innerHTML = "<p>❌ No hay imagen 360° disponible para esta especie.</p>";
      }
    }
  </script>
</body>
</html>
